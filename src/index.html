<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
</head>
<body>

    <input id="search" placeholder="Enter city name">
    <button id="new-location">Search</button>

    <div class="weather">
        <h1 class="city"></h1>
        <h2 class="temp"></h2>
        <p class="description"></p>
        <p class="humidity"></p>
        <p class="wind"></p>
    </div>

    <link rel="stylesheet" href="styles.css">
</body>
</html>
